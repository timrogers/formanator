name: Build, test and release

on: push

jobs:
  build:
    name: Build and test
    strategy:
      fail-fast: false
      matrix:
        job:
          - {
              target: x86_64-unknown-linux-gnu,
              binary_name: linux-amd64,
              runs_on: ubuntu-latest,
            }
          - {
              target: aarch64-unknown-linux-gnu,
              binary_name: linux-aarch64,
              runs_on: ubuntu-24.04-arm,
            }
          - {
              target: x86_64-apple-darwin,
              binary_name: darwin-amd64,
              runs_on: macos-latest,
            }
          - {
              target: aarch64-apple-darwin,
              binary_name: darwin-aarch64,
              runs_on: macos-latest,
            }
          - {
              target: x86_64-pc-windows-msvc,
              binary_name: windows-amd64.exe,
              runs_on: windows-latest,
            }
          - {
              target: aarch64-pc-windows-msvc,
              binary_name: windows-arm64.exe,
              runs_on: windows-11-arm,
            }
    runs-on: ${{ matrix.job.runs_on }}
    steps:
      - uses: actions/checkout@v6
      - name: Use stable Rust with target ${{ matrix.job.target }}
        run: rustup override set stable && rustup target add ${{ matrix.job.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Run unit tests
        run: cargo test --locked --all-features --target=${{ matrix.job.target }}
      - name: Build in release mode
        run: cargo build --release --locked --target=${{ matrix.job.target }}
      - name: Sanitise Git ref for use in filenames
        id: sanitise_ref
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "value=${REF_NAME//\//_}" >> "$GITHUB_OUTPUT"
      - name: Rename Windows binary to use structured filename
        if: runner.os == 'Windows'
        shell: bash
        run: cp target/${{ matrix.job.target }}/release/formanator.exe formanator_${{ steps.sanitise_ref.outputs.value }}_${{ matrix.job.binary_name }}
      - name: Rename Unix binary to use structured filename
        if: runner.os != 'Windows'
        shell: bash
        run: |
          rm -f target/${{ matrix.job.target }}/release/formanator.d
          cp target/${{ matrix.job.target }}/release/formanator formanator_${{ steps.sanitise_ref.outputs.value }}_${{ matrix.job.binary_name }}
      - name: Write Apple signing key to a file (macOS only)
        if: runner.os == 'macOS'
        env:
          APPLE_SIGNING_KEY_P12: ${{ secrets.APPLE_SIGNING_KEY_P12 }}
        run: echo "$APPLE_SIGNING_KEY_P12" | base64 -d -o key.p12
      - name: Write App Store Connect API key to a file (macOS only)
        if: runner.os == 'macOS'
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: echo "$APP_STORE_CONNECT_API_KEY" > app_store_connect_api_key.json
      - name: Sign macOS binary (macOS only)
        if: runner.os == 'macOS'
        uses: indygreg/apple-code-sign-action@v1
        with:
          input_path: formanator_${{ steps.sanitise_ref.outputs.value }}_${{ matrix.job.binary_name }}
          p12_file: key.p12
          p12_password: ${{ secrets.APPLE_SIGNING_KEY_PASSWORD }}
          sign: true
          sign_args: "--code-signature-flags=runtime"
      - name: Upload binary as artifact
        uses: actions/upload-artifact@v7
        with:
          path: formanator_${{ steps.sanitise_ref.outputs.value }}_${{ matrix.job.binary_name }}
          name: formanator_${{ steps.sanitise_ref.outputs.value }}_${{ matrix.job.binary_name }}
      - name: Archive macOS binary for notarisation (macOS only)
        if: runner.os == 'macOS'
        run: zip formanator_${{ steps.sanitise_ref.outputs.value }}_${{ matrix.job.binary_name }}.zip formanator_${{ steps.sanitise_ref.outputs.value }}_${{ matrix.job.binary_name }}
      - name: Notarise signed macOS binary (macOS only)
        if: runner.os == 'macOS'
        uses: indygreg/apple-code-sign-action@v1
        with:
          input_path: formanator_${{ steps.sanitise_ref.outputs.value }}_${{ matrix.job.binary_name }}.zip
          sign: false
          notarize: true
          app_store_connect_api_key_json_file: app_store_connect_api_key.json

  create_and_sign_macos_universal_binary:
    name: Create and sign macOS universal binary (macOS only)
    runs-on: macos-latest
    needs: build
    steps:
      - name: Sanitise Git ref for use in filenames
        id: sanitise_ref
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "value=${REF_NAME//\//_}" >> "$GITHUB_OUTPUT"
      - name: Download macOS amd64 binary
        uses: actions/download-artifact@v8
        with:
          name: formanator_${{ steps.sanitise_ref.outputs.value }}_darwin-amd64
      - name: Download macOS arm64 binary
        uses: actions/download-artifact@v8
        with:
          name: formanator_${{ steps.sanitise_ref.outputs.value }}_darwin-aarch64
      - name: Create universal macOS binary
        run: |
          lipo -create -output formanator_${{ steps.sanitise_ref.outputs.value }}_darwin-universal \
            formanator_${{ steps.sanitise_ref.outputs.value }}_darwin-amd64 \
            formanator_${{ steps.sanitise_ref.outputs.value }}_darwin-aarch64
      - name: Write Apple signing key to a file (macOS only)
        env:
          APPLE_SIGNING_KEY_P12: ${{ secrets.APPLE_SIGNING_KEY_P12 }}
        run: echo "$APPLE_SIGNING_KEY_P12" | base64 -d -o key.p12
      - name: Write App Store Connect API key to a file (macOS only)
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: echo "$APP_STORE_CONNECT_API_KEY" > app_store_connect_api_key.json
      - name: Sign macOS binary (macOS only)
        uses: indygreg/apple-code-sign-action@v1
        with:
          input_path: formanator_${{ steps.sanitise_ref.outputs.value }}_darwin-universal
          p12_file: key.p12
          p12_password: ${{ secrets.APPLE_SIGNING_KEY_PASSWORD }}
          sign: true
          sign_args: "--code-signature-flags=runtime"
      - name: Upload universal binary as artifact
        uses: actions/upload-artifact@v7
        with:
          path: formanator_${{ steps.sanitise_ref.outputs.value }}_darwin-universal
          name: formanator_${{ steps.sanitise_ref.outputs.value }}_darwin-universal
      - name: Archive macOS binary for notarisation (macOS only)
        run: zip formanator_${{ steps.sanitise_ref.outputs.value }}_darwin-universal.zip formanator_${{ steps.sanitise_ref.outputs.value }}_darwin-universal
      - name: Notarise signed macOS binary (macOS only)
        uses: indygreg/apple-code-sign-action@v1
        with:
          input_path: formanator_${{ steps.sanitise_ref.outputs.value }}_darwin-universal.zip
          sign: false
          notarize: true
          app_store_connect_api_key_json_file: app_store_connect_api_key.json

  cargo_publish_dry_run:
    name: Publish with Cargo in dry-run mode
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - name: Use stable Rust
        run: rustup override set stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-edit
        run: cargo install cargo-edit
      - name: Set the version to a dummy version to allow publishing
        run: cargo set-version 9.9.9
      - name: Publish to Crates.io (dry run)
        run: cargo publish --dry-run --allow-dirty

  create_github_release:
    name: Create release with binary assets
    runs-on: ubuntu-latest
    needs:
      - build
      - create_and_sign_macos_universal_binary
    if: startsWith(github.event.ref, 'refs/tags/v')
    steps:
      - name: Sanitise Git ref for use in filenames
        id: sanitise_ref
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "value=${REF_NAME//\//_}" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v8
        with:
          name: formanator_${{ steps.sanitise_ref.outputs.value }}_linux-amd64
      - uses: actions/download-artifact@v8
        with:
          name: formanator_${{ steps.sanitise_ref.outputs.value }}_linux-aarch64
      - uses: actions/download-artifact@v8
        with:
          name: formanator_${{ steps.sanitise_ref.outputs.value }}_darwin-amd64
      - uses: actions/download-artifact@v8
        with:
          name: formanator_${{ steps.sanitise_ref.outputs.value }}_darwin-aarch64
      - uses: actions/download-artifact@v8
        with:
          name: formanator_${{ steps.sanitise_ref.outputs.value }}_darwin-universal
      - uses: actions/download-artifact@v8
        with:
          name: formanator_${{ steps.sanitise_ref.outputs.value }}_windows-amd64.exe
      - uses: actions/download-artifact@v8
        with:
          name: formanator_${{ steps.sanitise_ref.outputs.value }}_windows-arm64.exe
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            formanator_${{ steps.sanitise_ref.outputs.value }}_windows-amd64.exe
            formanator_${{ steps.sanitise_ref.outputs.value }}_windows-arm64.exe
            formanator_${{ steps.sanitise_ref.outputs.value }}_darwin-amd64
            formanator_${{ steps.sanitise_ref.outputs.value }}_darwin-aarch64
            formanator_${{ steps.sanitise_ref.outputs.value }}_linux-amd64
            formanator_${{ steps.sanitise_ref.outputs.value }}_linux-aarch64
            formanator_${{ steps.sanitise_ref.outputs.value }}_darwin-universal

  cargo_publish:
    name: Publish with Cargo to Crates.io
    runs-on: ubuntu-latest
    needs:
      - create_github_release
      - cargo_publish_dry_run
    if: startsWith(github.event.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      - name: Use stable Rust
        run: rustup override set stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish to Crates.io
        run: cargo publish --token ${{ secrets.CRATES_IO_API_TOKEN }}
